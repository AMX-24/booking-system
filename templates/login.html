<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل دخول الإدارة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
    </style>
</head>
<body>

<div class="login-card">
    <h4 class="text-center fw-bold text-dark mb-4">🔐 تسجيل دخول الأدمن</h4>
    
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="alert alert-danger text-center small fw-bold mb-3">{{ messages[0] }}</div>
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('login') }}" method="POST">
        <div class="mb-3">
            <label class="form-label small fw-bold">اسم المستخدم:</label>
            <input type="text" name="username" class="form-control" placeholder="admin_cti" required>
        </div>
        <div class="mb-4">
            <label class="form-label small fw-bold">كلمة المرور:</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold mb-3">دخول لوحة التحكم</button>
        <div class="text-center">
            <a href="{{ url_for('home') }}" class="text-muted small text-decoration-none">← العودة للموقع الرئيسي</a>
        </div>
    </form>
</div>

</body>
</html>
