<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل دخول الإدارة الآمن</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f1f5f9; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: white; border-radius: 16px; padding: 30px; width: 100%; max-width: 400px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
<div class="login-card shadow-sm">
    <h5 class="fw-bold text-center text-primary mb-4">🔐 تسجيل دخول لوحة التحكم العليا</h5>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} small text-center p-2" role="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="/login" method="POST">
        <div class="mb-3">
            <label class="form-label small fw-bold">اسم مستخدم الإدارة (Username):</label>
            <input type="text" name="username" class="form-control" placeholder="admin_cti" required>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">كلمة المرور (Password):</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold btn-sm py-2">دخول آمن</button>
    </form>
    <div class="text-center mt-3">
        <a href="/" class="text-muted small text-decoration-none">← العودة للرئيسية</a>
    </div>
</div>
</body>
</html>
