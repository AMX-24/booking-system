<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل دخول الإدارة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .login-container { max-width: 400px; margin: 80px auto; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 30px; margin-top: 50px; }
        .logo-box { width: 90px; height: 90px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: -75px auto 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 10px; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div class="container login-container">
    <div class="card text-center">
        <!-- الشعار في أعلى بطاقة تسجيل الدخول -->
        <div class="logo-box">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="شعار الكلية">
        </div>
        
        <h4 class="fw-bold text-primary mb-4">تسجيل دخول الإدارة ⚙️</h4>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} text-center fw-bold">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3 text-start">
                <label class="form-label fw-bold">اسم المستخدم:</label>
                <input type="text" name="username" class="form-control border-primary text-center" dir="ltr" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label fw-bold">كلمة المرور:</label>
                <input type="password" name="password" class="form-control border-primary text-center" dir="ltr" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 rounded-pill">تسجيل الدخول</button>
        </form>
        <a href="/" class="btn btn-link text-muted mt-3 text-decoration-none">العودة للرئيسية</a>
    </div>
</div>

</body>
</html>
