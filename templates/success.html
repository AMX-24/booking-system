<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم تأكيد الحجز بنجاح</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #a3bded 0%, #f4f7f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .success-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .ticket-box {
            background-color: #f8f9fa;
            border-right: 5px solid #2d6a4f;
            border-radius: 8px;
            padding: 20px;
            text-align: right;
            margin-top: 25px;
        }
        .check-icon {
            font-size: 4.5rem;
            color: #2d6a4f;
        }
    </style>
</head>
<body>

<div class="success-card">
    <div class="check-icon">✓</div>
    <h2 class="fw-bold text-dark mt-2">تم تسجيل حجزك بنجاح!</h2>
    <p class="text-secondary">يرجى تصوير الشاشة والالتزام بالموعد المحدد أدناه:</p>
    
    <div class="ticket-box shadow-sm">
        <p class="mb-2"><strong>👤 اسم المتدرب:</strong> {{ info.name }}</p>
        <p class="mb-2"><strong>💳 الرقم التدريبي:</strong> {{ info.id }}</p>
        <p class="mb-2"><strong>📁 القسم:</strong> {{ info.dept }}</p>
        <p class="mb-2"><strong>🏛️ المراجعة لدى:</strong> {{ info.entity }}</p>
        <p class="mb-2"><strong>📅 تاريخ الحجز:</strong> {{ info.date }}</p>
        <p class="m-0"><strong>⏱️ الوقت المحدد:</strong> <span class="badge bg-success fs-6 px-3" style="background-color: #2d6a4f !important;">{{ info.time }}</span></p>
    </div>
    
    <div class="d-grid mt-4">
        <a href="{{ url_for('home') }}" class="btn btn-success btn-lg fw-bold" style="background-color: #2d6a4f;">العودة للبوابة الرئيسية</a>
    </div>
</div>

</body>
</html>
