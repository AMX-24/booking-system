<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 40px; text-align: center; }
        .admin-container { background: white; max-width: 900px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #1e293b; color: white; padding: 15px; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .btn-group { margin-top: 30px; display: flex; justify-content: center; gap: 15px; }
        .btn-reset { background: #dc2626; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; text-decoration: none; font-weight: bold; }
        .btn-print { background: #475569; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        @media print { .btn-group { display: none; } }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>كشف الطلاب المسجلين</h1>
        <table>
            <thead><tr><th>الاسم</th><th>الرقم الأكاديمي</th><th>القسم</th><th>الوقت</th></tr></thead>
            <tbody>
                {% for b in bookings %}
                <tr><td>{{ b.name }}</td><td>{{ b.id }}</td><td>{{ b.section }}</td><td>{{ b.time }}</td></tr>
                {% else %}
                <tr><td colspan="4" style="padding: 30px;">لا توجد حجوزات</td></tr>
                {% endfor %}
            </tbody>
        </table>
        <div class="btn-group">
            <button onclick="window.print()" class="btn-print">طباعة الكشف</button>
            <a href="{{ url_for('clear_data') }}" class="btn-reset" onclick="return confirm('حذف الكل؟')">تصفير البيانات</a>
        </div>
    </div>
</body>
</html>
