<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحديد الموعد والتفاصيل</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .booking-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container my-5" style="max-width: 750px;">
    <div class="text-center mb-4">
        <h3 class="fw-bold text-primary">نموذج حجز الموعد لـ ({{ entity_name }})</h3>
        <p class="text-muted">يرجى تعبئة الحقول واختيار الموعد المناسب لإتمام الطلب</p>
    </div>

    <div class="booking-box">
        <form action="{{ url_for('book') }}" method="POST">
            <!-- 1. اختيار القسم (يقرأ ديناميكياً) -->
            <div class="mb-3">
                <label class="form-label fw-bold">اختر القسم الأكاديمي:</label>
                <select class="form-select" id="deptSelect" required onchange="filterEntities()">
                    <option value="" disabled selected>-- اختر القسم --</option>
                    {% for key, name in departments.items() %}
                        <option value="{{ key }}">{{ name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- 2. تحديد الشخص المسؤول -->
            <div class="mb-3">
                <label class="form-label fw-bold">اختر الشخص المراد مقابلته:</label>
                <select class="form-select" id="entitySelect" name="target_name" required disabled onchange="updateSlots()">
                    <option value="" disabled selected>-- اختر المسؤول --</option>
                </select>
            </div>

            <!-- 3. اختيار يوم المقابلة -->
            <div class="mb-3">
                <label class="form-label fw-bold">اختر يوم المقابلة:</label>
                <select class="form-select" id="daySelect" name="day_name" required disabled onchange="updateSlots()">
                    <option value="" disabled selected>-- اختر اليوم --</option>
                    <option value="sun">الأحد</option>
                    <option value="mon">الإثنين</option>
                    <option value="tue">الثلاثاء</option>
                    <option value="wed">الأربعاء</option>
                    <option value="thu">الخميس</option>
                </select>
            </div>

            <!-- 4. عرض الأوقات المتاحة الممررة أجاكس -->
            <div class="mb-4">
                <label class="form-label d-block fw-bold mb-2 text-center">⏱️ الفترات المتاحة في اليوم المختار:</label>
                <div id="slotsContainer" class="p-3 border rounded bg-light text-center min-vh-10">
                    <span class="text-muted small">الرجاء إكمال الخيارات السابقة لعرض الفترات.</span>
                </div>
                <input type="hidden" name="chosen_slot" id="hiddenSlotInput" required>
            </div>

            <hr>

            <!-- 5. بيانات المتدرب (ثابتة وظاهرة دائماً الآن) -->
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label small fw-bold">اسم المتدرب بالكامل:</label>
                    <input type="text" name="student_name" class="form-control" placeholder="اسمك الثلاثي" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold">الرقم الأكاديمي:</label>
                    <input type="number" name="student_id" class="form-control" placeholder="مثال: 44210000" required>
                </div>
            </div>

            <div class="d-flex justify-content-between">
                <a href="{{ url_for('home') }}" class="btn btn-secondary px-4 fw-bold">رجوع للرئيسية</a>
                <button type="submit" class="btn btn-primary px-5 fw-bold">تأكيد حجز الموعد</button>
            </div>
        </form>
    </div>
</div>

<script>
const db = {{ schedule_db | tojson }};
const currentType = "{{ entity_id }}";

function filterEntities() {
    const dept = document.getElementById('deptSelect').value;
    const entitySelect = document.getElementById('entitySelect');
    const daySelect = document.getElementById('daySelect');
    
    // تفريغ القائمة أولاً
    entitySelect.innerHTML = '<option value="" disabled selected>-- اختر المسؤول --</option>';
    
    let hasMembers = false;
    for (let name in db) {
        if (db[name].type === currentType && db[name].dept === dept) {
            let opt = document.createElement('option');
            opt.value = name;
            opt.innerText = name;
            entitySelect.appendChild(opt);
            hasMembers = true;
        }
    }
    
    // تفعيل الخانات حتى لو لم تكن هناك أسماء ليتمكن النظام من إظهار تنبيه واضح
    entitySelect.disabled = false;
    daySelect.disabled = false;
    
    if (!hasMembers) {
        entitySelect.innerHTML = '<option value="" disabled selected>-- لا يوجد مسؤولين مضافين لهذا القسم حالياً --</option>';
    }
    
    clearSlots();
}

function updateSlots() {
    const target = document.getElementById('entitySelect').value;
    const day = document.getElementById('daySelect').value;
    const container = document.getElementById('slotsContainer');
    
    if(!target || !day) return;
    
    let formData = new FormData();
    formData.append('target', target);
    formData.append('day_name', day);
    
    fetch('/get_slots_ajax', { method: 'POST', body: formData })
    .then(res => res.text())
    .then(html => { 
        if(html.strip === '') {
            container.innerHTML = '<span class="text-warning small fw-bold">لا توجد أوقات متاحة مسجلة لهذا المسؤول!</span>';
        } else {
            container.innerHTML = html; 
        }
    })
    .catch(() => { container.innerHTML = '<span class="text-danger">حدث خطأ أثناء تحميل الفترات!</span>'; });
}

function selectSlot(slot) {
    document.querySelectorAll('.slot-btn').forEach(b => b.classList.replace('btn-primary', 'btn-outline-primary'));
    event.target.classList.replace('btn-outline-primary', 'btn-primary');
    document.getElementById('hiddenSlotInput').value = slot;
}

function clearSlots() {
    document.getElementById('slotsContainer').innerHTML = '<span class="text-muted small">الرجاء إكمال الخيارات السابقة لعرض الفترات.</span>';
    document.getElementById('hiddenSlotInput').value = "";
}
</script>

</body>
</html>
