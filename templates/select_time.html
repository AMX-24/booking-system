<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1e3a8a; padding: 20px; font-family: sans-serif; }
        .card { max-width: 600px; margin: auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="card">
        <h4 class="text-center mb-4">طلب حجز موعد - {{ entity_id }}</h4>
        <form action="/submit_booking" method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>اسم المتدرب:</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>الرقم التدريبي:</label>
                    <input type="text" name="id" class="form-control" required>
                </div>
            </div>
            <div class="mb-3">
                <label>اختر الدكتور / المهندس:</label>
                <select name="doctor" class="form-select" required>
                    {% for name in staff %}
                        <option value="{{ name }}">{{ name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label>التاريخ:</label>
                <input type="text" id="datePicker" name="date" class="form-control" placeholder="اختر التاريخ" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">تأكيد الحجز</button>
        </form>
        <a href="/" class="btn btn-link w-100 mt-2">العودة للرئيسية</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/ar.js"></script>
    <script>
        flatpickr("#datePicker", { locale: "ar", dateFormat: "Y-m-d" });
    </script>
</body>
</html>
