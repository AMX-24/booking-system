<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديد الموعد والتاريخ فوري</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .header-box { background-color: #0f2b5c; color: white; padding: 25px; border-radius: 0 0 20px 20px; }
        .card-form { border: none; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); background: white; }
    </style>
</head>
<body>

<div class="header-box text-center shadow mb-4">
    <h3 class="fw-bold">بوابة حجز موعد: {{ entity_name }}</h3>
    <a href="/" class="text-white-50 small text-decoration-none">← العودة للشاشة الرئيسية</a>
</div>

<div class="container col-lg-7 my-4">
    <div class="card card-form p-4">
        <form action="/book" method="POST" id="bookingForm" onsubmit="return validateForm()">
            <div class="mb-3">
                <label class="form-label fw-bold">اسم المتدرب ثلاثي:</label>
                <input type="text" name="trainee_name" class="form-control py-2" required placeholder="أدخل اسمك الكامل">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">اختر القسم المختص بالمعاملة:</label>
                <select name="department" id="deptSelect" class="form-select py-2" required onchange="updateDoctors()">
                    <option value="" disabled selected>اختر القسم من القائمة</option>
                    {% for id, name in departments.items() %}
                        <option value="{{ id }}">{{ name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3" id="doctorContainer" style="display:none;">
                <label class="form-label fw-bold">اختر المهندس / الدكتور:</label>
                <select name="doctor" id="doctorSelect" class="form-select py-2"></select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">اختر تاريخ الحجز:</label>
                <input type="date" name="booking_date" id="booking_date" class="form-control py-2" required onchange="fetchSlots()">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">الفترات الزمنية المتاحة (تتحدث فورا من الأدمن):</label>
                <div id="slotsSection" class="p-3 bg-light rounded text-center text-muted">
                    الرجاء تحديد التاريخ والقسم أولاً لاستعراض الفترات الشاغرة.
                </div>
            </div>

            <input type="hidden" name="booking_time" id="selectedTime">
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mt-3" style="background-color:#0f2b5c;">تأكيد الحجز الفوري</button>
        </form>
    </div>
</div>

<script>
const docsData = {{ doctors_by_dept|tojson }};
const activeDays = {{ settings.available_days|tojson }};

function updateDoctors() {
    const dept = document.getElementById('deptSelect').value;
    const docSelect = document.getElementById('doctorSelect');
    const container = document.getElementById('doctorContainer');
    
    docSelect.innerHTML = '';
    if(docsData[dept] && docsData[dept].length > 0) {
        docsData[dept].forEach(d => {
            let opt = document.createElement('option');
            opt.value = d; opt.innerText = d;
            docSelect.appendChild(opt);
        });
        container.style.display = 'block';
    } else {
        container.style.display = 'none';
    }
    fetchSlots();
}

function fetchSlots() {
    const dateInput = document.getElementById('booking_date').value;
    if(!dateInput) return;
    
    // التحقق من اليوم المختار تزامناً مع الإدارة
    const dayName = new Date(dateInput).toLocaleDateString('en-US', { weekday: 'short' }).toLowerCase();
    
    // تحويل الاسماء المختصرة لتطابق مصفوفة الإدارة
    const dayMap = { 'sun': 'sun', 'mon': 'mon', 'tue': 'tue', 'wed': 'wed', 'thu': 'thu' };
    
    if (!activeDays.includes(dayMap[dayName])) {
        document.getElementById('slotsSection').innerHTML = '<span class="text-danger fw-bold">عذراً، هذا اليوم غير متاح للحجز حسب خطة عمل الإدارة الحالية!</span>';
        return;
    }
    
    document.getElementById('slotsSection').innerHTML = '<div class="spinner-border text-primary text-center"></div>';
    
    fetch('/get_available_slots', { method: 'POST' })
    .then(res => res.text())
    .then(html => {
        document.getElementById('slotsSection').innerHTML = html;
    });
}

function selectSlot(time) {
    document.querySelectorAll('.slot-btn').forEach(b => b.classList.replace('btn-primary', 'btn-outline-primary'));
    event.target.classList.replace('btn-outline-primary', 'btn-primary');
    document.getElementById('selectedTime').value = time;
}

function validateForm() {
    if(!document.getElementById('selectedTime').value) {
        alert('الرجاء اختيار فترة زمنية صالحة ومتاحة للحجز!');
        return false;
    }
    return true;
}
</script>
</body>
</html>
