<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1e3a8a; padding: 20px; font-family: 'Segoe UI', sans-serif; }
        .card { max-width: 600px; margin: auto; padding: 30px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="card shadow-lg">
        <h4 class="text-center mb-4">طلب حجز موعد لدى: {{ entity_id }}</h4>
        <form action="/submit_booking" method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>اسم المتدرب ثلاثي:</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>الرقم التدريبي:</label>
                    <input type="text" name="id" class="form-control" required>
                </div>
            </div>
            <div class="mb-3">
                <label>اختر الدكتور / المهندس:</label>
                <select name="doctor" class="form-select" required>
                    {% for name in staff %}
                        <option value="{{ name }}">{{ name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label>تاريخ الحجز:</label>
                <input type="date" name="date" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">تأكيد الحجز النهائي</button>
        </form>
        <a href="/" class="btn btn-link w-100 mt-2">رجوع للرئيسية</a>
    </div>
</body>
</html>
