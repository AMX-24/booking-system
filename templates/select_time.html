<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة حجز المواعيد للمتدربين</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .header-box { background-color: #0b2c61; color: white; padding: 20px; border-radius: 0 0 16px 16px; }
        .booking-card { background: white; border-radius: 16px; padding: 25px; border: none; }
    </style>
</head>
<body>

<div class="header-box text-center shadow-sm">
    <h5 class="fw-bold m-0">بوابة المواعيد لـ: {{ entity_name }}</h5>
    <a href="/" class="text-white-50 small text-decoration-none">← العودة للشاشة الرئيسية</a>
</div>

<div class="container col-lg-6 my-4">
    <div class="booking-card shadow-sm">
        <form action="/book" method="POST" onsubmit="return validateForm()">
            <input type="hidden" id="entity_id" value="{{ entity_id }}">

            <div class="mb-3">
                <label class="form-label small fw-bold">اسم المتدرب الكامل:</label>
                <input type="text" name="trainee_name" class="form-control form-control-sm py-2" required placeholder="أدخل اسمك ثلاثي">
            </div>

            <!-- يظهر فقط لرئيس القسم وأعضاء هيئة التدريس -->
            {% if entity_id == 'head' or entity_id == 'faculty' %}
            <div class="mb-3" id="deptBlock">
                <label class="form-label small fw-bold">اختر القسم المختص بالمعاملة:</label>
                <select id="deptSelect" class="form-select form-select-sm py-2" required onchange="handleDeptChange()">
                    <option value="" disabled selected>اختر قسمك الحالي</option>
                    {% for id, name in departments.items() %}
                        <option value="{{ id }}">{{ name }}</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}

            <!-- يظهر فقط لأعضاء هيئة التدريس -->
            {% if entity_id == 'faculty' %}
            <div class="mb-3" id="docBlock" style="display:none;">
                <label class="form-label small fw-bold">اختر المهندس / الدكتور المطلوب للمقابلة:</label>
                <select name="doctor" id="doctorSelect" class="form-select form-select-sm py-2" onchange="fetchSlots()">
                    <option value="" disabled selected>الرجاء تحديد القسم أولاً</option>
                </select>
            </div>
            {% endif %}

            <!-- التقويم الثابت المعتمد في الأنظمة الفورية -->
            <div class="mb-3">
                <label class="form-label small fw-bold">اختر تاريخ الحجز المتاح:</label>
                <input type="date" name="booking_date" id="bookingDate" class="form-control form-control-sm py-2" required onchange="fetchSlots()">
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold text-primary">الساعات المتوفرة حالياً حسب جدول الإدارة الحالية:</label>
                <div id="slotsContainer" class="p-3 bg-light rounded text-center small text-muted">
                    الرجاء إكمال الاختيارات والتاريخ لعرض الفترات المتوفرة.
                </div>
            </div>

            <input type="hidden" name="booking_time" id="selectedTime">
            <button type="submit" class="btn btn-primary w-100 fw-bold btn-sm py-2 mt-2" style="background-color: #0b2c61;">تأكيد موعد الحجز الفوري</button>
        </form>
    </div>
</div>

<script>
const scheduleData = {{ schedule_db|tojson }};
const entityId = document.getElementById('entity_id').value;

function handleDeptChange() {
    const selectedDept = document.getElementById('deptSelect').value;
    
    if (entityId === 'faculty') {
        const docSelect = document.getElementById('doctorSelect');
        docSelect.innerHTML = '<option value="" disabled selected>اختر الدكتور من هذا القسم</option>';
        
        for (let name in scheduleData) {
            if (scheduleData[name].type === 'faculty' && scheduleData[name].dept === selectedDept) {
                let opt = document.createElement('option');
                opt.value = name; opt.innerText = name;
                docSelect.appendChild(opt);
            }
        }
        document.getElementById('docBlock').style.display = 'block';
    }
    fetchSlots();
}

function fetchSlots() {
    const dateVal = document.getElementById('bookingDate').value;
    const container = document.getElementById('slotsContainer');
    if(!dateVal) return;
    
    let targetKey = "";
    
    if (entityId === 'affairs') {
        targetKey = "شؤون المتدربين";
    } else if (entityId === 'head') {
        const selectedDept = document.getElementById('deptSelect').value;
        if(!selectedDept) return;
        // البحث عن رئيس القسم المطابق للقسم المختار
        for (let name in scheduleData) {
            if (scheduleData[name].type === 'head' && scheduleData[name].dept === selectedDept) {
                targetKey = name;
                break;
            }
        }
    } else if (entityId === 'faculty') {
        const docSelect = document.getElementById('doctorSelect');
        if(!docSelect || !docSelect.value) return;
        targetKey = docSelect.value;
    }
    
    if (!targetKey) {
        container.innerHTML = 'الرجاء اختيار القسم أو الكادر أولاً.';
        return;
    }
    
    const dayName = new Date(dateVal).toLocaleDateString('en-US', { weekday: 'short' }).toLowerCase();
    container.innerHTML = 'جاري قراءة الساعات..';
    
    const formData = new FormData();
    formData.append('target', targetKey);
    formData.append('day_name', dayName);
    
    fetch('/get_slots_ajax', { method: 'POST', body: formData })
    .then(res => res.text())
    .then(html => { container.innerHTML = html; });
}

function selectSlot(time) {
    document.querySelectorAll('.slot-btn').forEach(b => b.classList.replace('btn-primary', 'btn-outline-primary'));
    event.target.classList.replace('btn-outline-primary', 'btn-primary');
    document.getElementById('selectedTime').value = time;
}

function validateForm() {
    if(!document.getElementById('selectedTime').value) {
        alert('الرجاء اختيار فترة زمنية صالحة ومتاحة للحجز!');
        return false;
    }
    return true;
}
</script>
</body>
</html>
