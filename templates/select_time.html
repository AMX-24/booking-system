<div class="mb-3">
    <label>القسم:</label>
    <select id="deptSelect" class="form-select" onchange="loadStaff()">
        <option value="">-- اختر القسم --</option>
        {% for id, name in departments.items() %}
            <option value="{{ id }}">{{ name }}</option>
        {% endfor %}
    </select>
</div>

<div class="mb-3">
    <label>الدكتور / المهندس:</label>
    <select id="staffSelect" class="form-select">
        <option value="">-- اختر القسم أولاً --</option>
    </select>
</div>

<script>
function loadStaff() {
    let deptId = document.getElementById('deptSelect').value;
    let formData = new FormData();
    formData.append('dept_id', deptId);

    fetch('/get_staff_by_dept', {
        method: 'POST',
        body: formData
    })
    .then(response => response.text())
    .then(html => {
        document.getElementById('staffSelect').innerHTML = html;
    });
}
</script>
