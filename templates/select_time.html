<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب حجز موعد - {{ entity_name }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a3bded 0%, #f4f7f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .booking-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 35px;
            max-width: 750px;
            width: 100%;
        }
        .slot-btn {
            min-width: 100px;
            font-weight: 600;
        }
        .slot-btn.selected {
            background-color: #198754 !important;
            color: white !important;
        }
    </style>
</head>
<body>

<div class="booking-card">
    <h3 class="text-center fw-bold text-success mb-4">طلب حجز موعد لدى: {{ entity_name }}</h3>
    <hr>

    <!-- عرض رسائل الخطأ إن وجدت -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} text-center fw-bold">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('book') }}" method="POST" id="bookingForm">
        <!-- حقول مخفية لإرسالها للسيرفر -->
        <input type="hidden" name="entity_id" id="entity_id" value="{{ entity_id }}">
        <input type="hidden" name="booking_time" id="booking_time" required>

        <div class="row g-3">
            <!-- اسم المتدرب -->
            <div class="col-md-6">
                <label class="form-label fw-bold">اسم المتدرب ثلاثي:</label>
                <input type="text" name="trainee_name" class="form-control" placeholder="أدخل اسمك هنا" required>
            </div>

            <!-- الرقم الأكاديمي -->
            <div class="col-md-6">
                <label class="form-label fw-bold">الرقم الأكاديمي:</label>
                <input type="text" name="trainee_id" class="form-control" placeholder="مثال: 442100000" required>
            </div>

            <!-- القسم الأكاديمي -->
            <div class="col-md-12">
                <label class="form-label fw-bold">القسم التعليمي:</label>
                <select name="department" id="department" class="form-select" required onchange="fetchSlots()">
                    <option value="" selected disabled>اختر قسمك التعليمي</option>
                    {% for id, name in departments.items() %}
                        <option value="{{ id }}">{{ name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <!-- قسم المواعيد المتاحة -->
        <div class="mt-4">
            <label class="form-label fw-bold text-dark">⏱️ المواعيد المتاحة للفرز الفوري:</label>
            <div id="slots_container" class="p-3 border rounded bg-light text-center">
                <p class="text-muted m-0">الرجاء اختيار القسم أولاً لعرض الأوقات المتاحة.</p>
            </div>
        </div>

        <!-- أزرار التحكم -->
        <div class="d-flex justify-content-between mt-4">
            <button type="submit" class="btn btn-success px-4 fw-bold fs-5">تأكيد الحجز النهائي</button>
            <a href="{{ url_for('home') }}" class="btn btn-outline-secondary px-4 fw-bold">رجوع للرئيسية</a>
        </div>
    </form>
</div>

<!-- كود الأجاكس للفرز التلقائي بمجرد اختيار القسم -->
<script>
function fetchSlots() {
    const dept = document.getElementById('department').value;
    const entityId = document.getElementById('entity_id').value;
    const container = document.getElementById('slots_container');
    
    if (!dept) return;

    container.innerHTML = '<span class="text-secondary fw-bold">جاري تحديث المواعيد المتاحة...</span>';

    // إرسال طلب للسيرفر لجلب الأوقات المتاحة بناءً على القسم فقط
    const formData = new FormData();
    formData.append('entity_id', entityId);
    formData.append('department', dept);

    fetch("{{ url_for('get_available_slots') }}", {
        method: "POST",
        body: formData
    })
    .then(response => response.text())
    .then(html => {
        container.innerHTML = html;
        document.getElementById('booking_time').value = ""; // تصفير الوقت المختار سابقاً
    })
    .catch(err => {
        container.innerHTML = '<span class="text-danger">حدث خطأ أثناء جلب المواعيد.</span>';
    });
}

function selectSlot(timeValue) {
    // تحديد الزر المختار وتغيير لونه
    const buttons = document.querySelectorAll('.slot-btn');
    buttons.forEach(btn => btn.classList.remove('selected'));
    
    event.target.classList.add('selected');
    // حفظ الوقت في الحقل المخفي قبل الإرسال
    document.getElementById('booking_time').value = timeValue;
}
</script>

</body>
</html>
