<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة المواعيد</title>
    <!-- تضمين مكتبات التصميم والتقويم الاحترافية السحابية السريعة -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; padding: 40px 10px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .booking-card { max-width: 650px; margin: auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 15px 35px rgba(30, 58, 138, 0.1); }
        .main-title { color: #1e3a8a; font-weight: bold; margin-bottom: 5px; }
        .sub-title { color: #6b7280; font-size: 14px; margin-bottom: 30px; }
        .section-title { font-size: 15px; font-weight: 600; color: #1e3a8a; margin-top: 20px; margin-bottom: 15px; }
        .time-slot-btn { border: 2px solid #e5e7eb; border-radius: 10px; padding: 10px; background: white; color: #374151; transition: all 0.2s; font-weight: 500; }
        .time-slot-btn:hover { border-color: #1e3a8a; background: #eff6ff; }
        .time-slot-btn.active { background: #1e3a8a; color: white; border-color: #1e3a8a; }
        #slotsContainer button.slot-btn { margin: 5px; }
    </style>
</head>
<body>

    <div class="booking-card">
        <h2 class="text-center main-title">بوابة المواعيد لـ: {{ entity_name }}</h2>
        <p class="text-center sub-title">يرجى إدخال بياناتك واختيار الموعد المناسب لإتمام الطلب</p>
        
        <form action="/book" method="POST" id="bookingForm">
            <!-- الصف الأول: الاسم والرقم الأكاديمي -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label font-weight-bold">اسم المتدرب ثلاثي:</label>
                    <input type="text" name="student_name" class="form-control" placeholder="أدخل اسمك الثلاثي" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">الرقم التدريبي:</label>
                    <input type="text" name="student_id" class="form-control" placeholder="مثال: 44210000" required>
                </div>
            </div>

            <!-- الصف الثاني: تحديد واختيار القسم (الحل الأساسي المفقود) -->
            <div class="mb-3">
                <label class="form-label">اختر القسم المختص:</label>
                <select id="departmentSelect" class="form-select" required onchange="filterStaffByDept()">
                    <option value="" disabled selected>-- اختر القسم الأكاديمي أولاً --</option>
                    {% for dept_id, dept_name in departments.items() %}
                        <option value="{{ dept_id }}">{{ dept_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- الصف الثالث: اختيار المسؤول المعني (يتم تحديثه ديناميكياً) -->
            <div class="mb-3">
                <label class="form-label">اختر الدكتور / المسؤول:</label>
                <select name="target" id="targetStaff" class="form-select" required onchange="resetDateTime()">
                    <option value="" disabled selected>-- الرجاء اختيار القسم أولاً لعرض المتاحين --</option>
                    {% for name, info in schedule_db.items() %}
                        <!-- جلب المسؤولين وتصنيفهم برمز القسم كـ class من أجل الجافا سكريبت -->
                        <option value="{{ name }}" data-dept="{{ info.dept }}" class="staff-option d-none" data-type="{{ info.type }}">
                            {{ name }} ({% if info.type == 'head' %}رئيس قسم{% else %}عضو هيئة تدريس{% endif %})
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- الصف الرابع: حقل التاريخ التفاعلي -->
            <div class="mb-4">
                <label class="form-label">تاريخ الحجز:</label>
                <input type="text" id="liveDatePicker" name="booking_date" class="form-control bg-white" placeholder="اضغط هنا لاختيار التاريخ" required readonly>
            </div>

            <!-- قسم الساعات المتوفرة حياً -->
            <div class="section-title">
                ⏱️ الساعات المتوفرة حالياً:
            </div>
            
            <!-- الرسالة الافتراضية قبل اختيار التاريخ -->
            <div id="statusPlaceholder" class="alert alert-light text-center border p-4 text-muted">
                الرجاء إكمال الاختيارات والتاريخ لعرض الفترات المتوفرة المتاحة.
            </div>

            <!-- الحاوية التي ستظهر فيها الأزرار الحية (AJAX) -->
            <div id="slotsContainer" class="d-none mb-4">
                <!-- الأزرار ستحمل هنا ديناميكياً -->
            </div>

            <!-- حقل مخفي لإرسال الساعة المحددة -->
            <input type="hidden" id="selectedTimeInput" name="booking_time" required>

            <!-- أزرار التحكم -->
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary flex-grow-1 py-2" style="background-color: #1e3a8a;">تأكيد موعد الحجز</button>
                <a href="/" class="btn btn-secondary px-4 py-2">رجوع للرئيسية</a>
            </div>
        </form>
    </div>

    <!-- استدعاء السكربتات المعتمدة والضرورية للأياكس والتقويم -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/ar.js"></script>
    <script>
        // دالة الفلترة الذكية بناءً على القسم والأدوار الأكاديمية
        function filterStaffByDept() {
            const selectedDept = document.getElementById('departmentSelect').value;
            const staffSelect = document.getElementById('targetStaff');
            const urlPath = window.location.pathname; // معرفة هل الصفحة فتحت لـ faculty أو affairs أو head
            
            // تصفير القائمة واختيار الخيار الافتراضي
            staffSelect.value = "";
            resetDateTime();
            
            // إخفاء وإظهار الدكاترة وفقاً للقسم والصفحة الحالية
            document.querySelectorAll('.staff-option').forEach(option => {
                const optionDept = option.getAttribute('data-dept');
                const optionType = option.getAttribute('data-type');
                
                // إذا كان القسم متطابقاً نقوم بإظهاره، مع مراعاة نوع المسؤول إذا لزم الأمر
                if (optionDept === selectedDept) {
                    if (urlPath.includes('faculty') && optionType === 'head') {
                        option.classList.add('d-none'); // إخفاء رؤساء الأقسام في صفحة دكاترة هيئة التدريس
                    } else if (urlPath.includes('head') && optionType !== 'head') {
                        option.classList.add('d-none'); // إخفاء الأعضاء العاديين في صفحة رئيس القسم
                    } else {
                        option.classList.remove('d-none'); // إظهار الخيار المتوافق
                    }
                } else {
                    option.classList.add('d-none');
                }
            });
            
            // تحديث نص الخيار الأول الإرشادي
            staffSelect.options[0].text = "-- اختر الآن من قائمة الكادر المتاح للقسم --";
        }

        // دالة لإعادة تعيين التاريخ والوقت عند تغيير المسؤول أو القسم
        function resetDateTime() {
            document.getElementById('liveDatePicker').value = '';
            document.getElementById('statusPlaceholder').classList.remove('d-none');
            document.getElementById('slotsContainer').classList.add('d-none');
            document.getElementById('selectedTimeInput').value = '';
        }

        // تفعيل التقويم المنبثق
        flatpickr("#liveDatePicker", {
            locale: "ar",
            dateFormat: "Y-m-d",
            minDate: "today",
            onChange: function(selectedDates, dateStr, instance) {
                const target = document.getElementById('targetStaff').value;
                if (target && dateStr) {
                    fetchAvailableSlots(target, dateStr);
                }
            }
        });

        // وظيفة جلب الفترات المتاحة عبر الأياكس (متوافقة تماماً مع الكود القديم في السيرفر)
        function fetchAvailableSlots(target, dateStr) {
            const dateObj = new Date(dateStr);
            const days = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
            const dayName = days[dateObj.getDay()];

            $.ajax({
                url: '/get_slots_ajax',
                method: 'POST',
                data: { target: target, day_name: dayName },
                success: function(htmlResponse) {
                    if (htmlResponse && !htmlResponse.includes('غير متاح للمقابلة')) {
                        document.getElementById('statusPlaceholder').classList.add('d-none');
                        const container = document.getElementById('slotsContainer');
                        container.classList.remove('d-none');
                        container.innerHTML = htmlResponse;
                    } else {
                        // في حال أرجع السيرفر رسالة أن اليوم غير متاح للمسؤول
                        document.getElementById('statusPlaceholder').classList.remove('d-none');
                        document.getElementById('statusPlaceholder').innerHTML = htmlResponse ? htmlResponse : '<span class="text-danger small">عذراً، لا تتوفر فترات مجدولة لهذا الدكتور في اليوم المختار!</span>';
                        document.getElementById('slotsContainer').classList.add('d-none');
                    }
                }
            });
        }

        // وظيفة تحديد الوقت من الأزرار الحية المستلمة
        function selectSlot(timeString, buttonElement) {
            document.querySelectorAll('#slotsContainer button.slot-btn').forEach(btn => {
                btn.classList.remove('active', 'btn-primary');
                btn.classList.add('btn-outline-primary');
            });
            
            // في حال تم استخدام عناصر onclick قديمة بدون تمرير this
            if(buttonElement) {
                buttonElement.classList.add('active', 'btn-primary');
                buttonElement.classList.remove('btn-outline-primary');
            }
            document.getElementById('selectedTimeInput').value = timeString;
        }
    </script>
</body>
</html>
