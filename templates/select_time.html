<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديد موعد الحجز - {{ entity_name }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #a3bded 0%, #f4f7f6 100%);
            min-height: 100vh;
            padding: 40px 10px;
        }
        .booking-card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 20px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.12);
            padding: 35px;
            max-width: 750px;
            margin: 0 auto;
        }
        .header-title {
            color: #2d6a4f;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        .slot-btn {
            min-width: 100px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .slot-btn.selected {
            background-color: #2d6a4f !important;
            color: white !important;
            border-color: #2d6a4f !important;
        }
    </style>
</head>
<body>

<div class="booking-card">
    <h3 class="header-title fw-bold text-center">طلب حجز موعد لدى: <span class="text-dark">{{ entity_name }}</span></h3>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} text-center" role="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('book') }}" method="POST" id="mainBookingForm">
        <input type="hidden" name="entity_id" id="entity_id" value="{{ entity_id }}">
        <input type="hidden" name="booking_time" id="selected_time" value="">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold text-secondary">اسم المتدرب ثلاثي:</label>
                <input type="text" name="trainee_name" class="form-control form-control-lg" required placeholder="أدخل اسمك هنا">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold text-secondary">الرقم التدريبي:</label>
                <input type="number" name="trainee_id" class="form-control form-control-lg" required placeholder="مثال: 442100000">
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-4">
                <label class="form-label fw-bold text-secondary">القسم التدريبي:</label>
                <select name="department" id="department" class="form-select form-control-lg" required onchange="fetchAvailableSlots()">
                    <option value="" disabled selected>اختر قسمك التعليمي</option>
                    {% for id, name in departments.items() %}
                        <option value="{{ id }}">{{ name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6 mb-4">
                <label class="form-label fw-bold text-secondary">تاريخ الحجز:</label>
                <input type="date" name="booking_date" id="booking_date" class="form-control form-control-lg" required onchange="fetchAvailableSlots()">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label d-block fw-bold text-dark mb-3 text-center">⏱️ المواعيد المتاحة للفرز الفوري:</label>
            <div id="slots_container" class="border rounded p-3 text-center bg-light">
                <p class="text-muted m-0">الرجاء اختيار القسم وتحديد التاريخ أولاً لعرض الأوقات المتاحة.</p>
            </div>
        </div>

        <div class="d-grid gap-2 d-md-flex justify-content-md-between mt-4">
            <a href="{{ url_for('home') }}" class="btn btn-light btn-lg px-4 border">رجوع للرئيسية</a>
            <button type="submit" class="btn btn-success btn-lg px-5 fw-bold" style="background-color: #2d6a4f;">تأكيد الحجز النهائي</button>
        </div>
    </form>
</div>

<script>
    // وضع حد أدنى للتاريخ ليكون من اليوم فصاعداً لحماية النظام
    document.getElementById('booking_date').min = new Date().toISOString().split("T")[0];

    function fetchAvailableSlots() {
        const entityId = document.getElementById('entity_id').value;
        const dept = document.getElementById('department').value;
        const date = document.getElementById('booking_date').value;
        const container = document.getElementById('slots_container');

        if (!dept || !date) return;

        container.innerHTML = '<div class="spinner-border text-success" role="status"><span class="visually-hidden">جاري الفرز...</span></div>';

        const formData = new FormData();
        formData.append('entity_id', entityId);
        formData.append('department', dept);
        formData.append('booking_date', date);

        fetch('/get_available_slots', {
            method: 'POST',
            body: formData
        })
        .then(response => response.text())
        .then(html => {
            container.innerHTML = html;
            document.getElementById('selected_time').value = ""; // تصفير الوقت القديم
        })
        .catch(error => {
            container.innerHTML = '<p class="text-danger m-0">حدث خطأ أثناء تحميل البيانات، يرجى المحاولة لاحقاً.</p>';
        });
    }

    function selectSlot(timeValue) {
        document.getElementById('selected_time').value = timeValue;
        
        // إعطاء مظهر تفاعلي للزر المختار وتلوينه باللون الداكن
        const buttons = document.querySelectorAll('.slot-btn');
        buttons.forEach(btn => {
            if (btn.innerText.trim() === timeValue) {
                btn.classList.add('selected');
            } else {
                btn.classList.remove('selected');
            }
        });
    }

    document.getElementById('mainBookingForm').onsubmit = function() {
        if (!document.getElementById('selected_time').value) {
            alert('فضلاً قم باختيار وقت محدد من المواعيد المتاحة قبل المتابعة.');
            return false;
        }
        return true;
    };
</script>

</body>
</html>
