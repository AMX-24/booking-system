<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحديد الموعد والتفاصيل</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .booking-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input[type="date"] { cursor: pointer; }
    </style>
</head>
<body>

<div class="container my-5" style="max-width: 750px;">
    <div class="text-center mb-4">
        <h3 class="fw-bold text-primary">بوابة المواعيد لـ: {{ entity_name }}</h3>
        <p class="text-muted small">يرجى إدخال بياناتك واختيار الموعد المناسب لإتمام الطلب فورياً</p>
    </div>

    <div class="booking-box">
        <form action="{{ url_for('book') }}" method="POST">
            
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-secondary">اسم المتدرب بالكامل:</label>
                    <input type="text" name="student_name" class="form-control" placeholder="أدخل اسمك الثلاثي" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold text-secondary">الرقم الأكاديمي:</label>
                    <input type="number" name="student_id" class="form-control" placeholder="مثال: 44210000" required>
                </div>
            </div>

            <hr class="text-muted">

            <div class="mb-4">
                <label class="form-label fw-bold text-dark">اختر القسم المختص بالمعاملة:</label>
                <select class="form-select" id="deptSelect" required onchange="handleDeptChange()">
                    <option value="" disabled selected>-- اختر القسم من هنا --</option>
                    {% for key, name in departments.items() %}
                        <option value="{{ key }}">{{ name }}</option>
                    {% endfor %}
                </select>
            </div>

            {% if entity_id == 'faculty' %}
            <div class="mb-4" id="facultyWrapper">
                <label class="form-label fw-bold text-dark">اختر الدكتور / المهندس:</label>
                <select class="form-select" id="facultySelect" name="target_name" required onchange="handleFacultyChange()">
                    <option value="" disabled selected>-- الرجاء اختيار القسم أولاً لرؤية الدكاترة --</option>
                </select>
            </div>
            {% endif %}

            <div class="mb-4">
                <label class="form-label fw-bold text-dark">تاريخ الحجز:</label>
                <input type="date" id="datePicker" name="booking_date" class="form-control" required disabled onchange="handleDateChange()">
                <small class="text-muted d-block mt-1">اضغط لاختيار التاريخ من التقويم</small>
            </div>

            <div class="mb-4">
                <label class="form-label d-block fw-bold mb-2 text-center text-primary">⏱️ الساعات المتوفرة حالياً حسب جدول الإدارة الحالية:</label>
                <div id="slotsContainer" class="p-3 border rounded bg-light text-center min-vh-10">
                    <span class="text-muted small">الرجاء إكمال الاختيارات والتاريخ لعرض الفترات المتوفرة.</span>
                </div>
                <input type="hidden" name="chosen_slot" id="hiddenSlotInput" required>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <a href="{{ url_for('home') }}" class="btn btn-secondary px-4 fw-bold">رجوع للرئيسية</a>
                <button type="submit" class="btn btn-primary px-5 fw-bold">تأكيد موعد الحجز الفوري</button>
            </div>
        </form>
    </div>
</div>

<script>
const db = {{ schedule_db | tojson }};
const currentType = "{{ entity_id }}";

// عند تغيير القسم
function handleDeptChange() {
    const dept = document.getElementById('deptSelect').value;
    const datePicker = document.getElementById('datePicker');
    const facultySelect = document.getElementById('facultySelect');
    
    clearSlots();
    
    // إذا كنا بصفحة أعضاء هيئة التدريس، نقوم بفلترة الدكاترة التابعين للقسم المختار فوراً
    if (currentType === 'faculty' && facultySelect) {
        facultySelect.innerHTML = '<option value="" disabled selected>-- اختر الدكتور / المهندس --</option>';
        let hasData = false;
        
        for (let name in db) {
            if (db[name].type === 'faculty' && db[name].dept === dept) {
                let opt = document.createElement('option');
                opt.value = name;
                opt.innerText = name;
                facultySelect.appendChild(opt);
                hasData = true;
            }
        }
        
        if (!hasData) {
            facultySelect.innerHTML = '<option value="" disabled selected>-- لا يوجد دكاترة مضافين لهذا القسم حالياً --</option>';
            datePicker.disabled = true;
        } else {
            facultySelect.disabled = false;
            datePicker.disabled = true; // ينتظر اختيار الدكتور أولاً
        }
    } else {
        // شؤون المتدربين أو رؤساء الأقسام يفعلون التقويم مباشرة
        datePicker.disabled = false;
    }
}

// دالة تفعل التقويم بعد اختيار الدكتور
function handleFacultyChange() {
    document.getElementById('datePicker').disabled = false;
    clearSlots();
}

// عند اختيار تاريخ من التقويم
function handleDateChange() {
    const dateVal = document.getElementById('datePicker').value;
    const container = document.getElementById('slotsContainer');
    const dept = document.getElementById('deptSelect').value;
    
    if (!dateVal || !dept) return;

    const dateObj = new Date(dateVal);
    const daysMapping = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
    const dayName = daysMapping[dateObj.getDay()];

    if (dayName === 'fri' || dayName === 'sat') {
        container.innerHTML = '<span class="text-danger small fw-bold">عذراً، نهاية الأسبوع (الجمعة والسبت) ليست أيام عمل رسمية!</span>';
        return;
    }

    let targetName = null;
    
    // إذا كنا في صفحة دكاترة، نأخذ الاسم المختار مباشرة من القائمة المستدلة
    if (currentType === 'faculty') {
        targetName = document.getElementById('facultySelect').value;
    } else {
        // إذا كنا بشؤون المتدربين أو رئيس القسم، نبحث عن الاسم المطابق ديناميكياً
        for (let name in db) {
            if (db[name].type === currentType && db[name].dept === dept) {
                targetName = name;
                break;
            }
        }
    }
    
    if (!targetName) {
        container.innerHTML = '<span class="text-warning small fw-bold">لا يوجد جدول مواعيد مضاف لهذا الاختيار حالياً!</span>';
        return;
    }
    
    let formData = new FormData();
    formData.append('target', targetName);
    formData.append('day_name', dayName);
    
    fetch('/get_slots_ajax', { method: 'POST', body: formData })
    .then(res => res.text())
    .then(html => { 
        if(html.trim() === '') {
            container.innerHTML = '<span class="text-warning small fw-bold">هذا اليوم غير متاح بجدول مواعيد هذا المسؤول!</span>';
        } else {
            container.innerHTML = html; 
        }
    })
    .catch(() => { container.innerHTML = '<span class="text-danger">حدث خطأ أثناء تحميل الفترات!</span>'; });
}

function selectSlot(slot) {
    document.querySelectorAll('.slot-btn').forEach(b => b.classList.replace('btn-primary', 'btn-outline-primary'));
    event.target.classList.replace('btn-outline-primary', 'btn-primary');
    document.getElementById('hiddenSlotInput').value = slot;
}

function clearSlots() {
    document.getElementById('slotsContainer').innerHTML = '<span class="text-muted small">الرجاء إكمال الاختيارات والتاريخ لعرض الفترات المتوفرة.</span>';
    document.getElementById('hiddenSlotInput').value = "";
}
</script>

</body>
</html>
