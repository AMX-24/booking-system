<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background: #f0f2f5; padding-top: 50px; }</style>
</head>
<body>
    <div class="container" style="max-width: 500px; background: white; padding: 30px; border-radius: 20px;">
        <h4 class="text-center mb-4">اختيار المسؤول والموعد</h4>
        <form action="{{ url_for('book') }}" method="POST">
            <div class="mb-3">
                <select name="target_name" class="form-select" required>
                    <option value="" disabled selected>اختر الاسم...</option>
                    {% for name in staff_list %}
                    <option value="{{ name }}">{{ name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <input type="datetime-local" name="booking_time" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">تأكيد الحجز</button>
        </form>
    </div>
</body>
</html>
