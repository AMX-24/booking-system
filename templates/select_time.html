<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حجز الموعد</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; padding-top: 50px; }
        .container { max-width: 500px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h4 class="text-center mb-4">اختيار المسؤول والموعد</h4>
        <form action="{{ url_for('book') }}" method="POST">
            <div class="mb-3">
                <label class="form-label">الشخص المطلوب:</label>
                <select name="target_name" class="form-select" required>
                    <option value="" disabled selected>اختر من القائمة...</option>
                    {% for name in staff_list %}
                    <option value="{{ name }}">{{ name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">التاريخ والوقت:</label>
                <input type="datetime-local" name="booking_time" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">تأكيد الحجز</button>
        </form>
        <br>
        <a href="{{ url_for('home') }}" class="btn btn-link w-100">العودة للرئيسية</a>
    </div>
</body>
</html>
