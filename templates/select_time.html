<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز موعد - {{ entity_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/light.css">
    
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .booking-card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); background: white; padding: 30px; }
        .form-label { font-weight: bold; color: #1e3a8a; }
        .slot-btn { margin-bottom: 10px; font-weight: bold; transition: 0.2s; }
        .slot-btn.selected { background-color: #1e3a8a !important; color: white !important; border-color: #1e3a8a !important; transform: scale(1.02); }
        .header-banner { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); color: white; padding: 40px 20px; border-radius: 0 0 25px 24px; margin-bottom: 40px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* =========================================================
           تخصيص تصميم التقويم ليطابق الصورة المرفقة بالملي
           ========================================================= */
        .flatpickr-calendar {
            border: none !important;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15) !important;
            border-radius: 12px !important;
            overflow: hidden;
            font-family: inherit;
        }
        /* الهيدر الأزرق للتقويم */
        .flatpickr-months, .flatpickr-weekdays {
            background-color: #1877f2 !important; /* لون أزرق مطابق للصورة */
        }
        .flatpickr-month, .flatpickr-current-month .flatpickr-monthDropdown-months, .flatpickr-current-month input.cur-year, .flatpickr-weekday {
            color: white !important;
            fill: white !important;
        }
        .flatpickr-current-month .flatpickr-monthDropdown-months:hover {
            background-color: rgba(255,255,255,0.1) !important;
        }
        .flatpickr-next-month svg, .flatpickr-prev-month svg {
            fill: white !important;
        }
        /* تحديد اليوم */
        .flatpickr-day.selected {
            background-color: #1877f2 !important;
            border-color: #1877f2 !important;
        }
        .flatpickr-day.today {
            border-color: #1877f2 !important;
        }
        /* شكل حقل إدخال التاريخ */
        #bookingDate {
            cursor: pointer;
            background-color: #fff;
            caret-color: transparent; /* إخفاء مؤشر الكتابة */
        }
        #bookingDate:focus {
            box-shadow: 0 0 0 0.25rem rgba(24, 119, 242, 0.25);
            border-color: #1877f2;
        }
    </style>
</head>
<body>

<div class="header-banner text-center">
    <h2 class="fw-bold mb-2">بوابة المواعيد لـ: {{ entity_name }}</h2>
    <p class="mb-0 opacity-75 fs-5">يرجى إدخال بياناتك واختيار الموعد المناسب لإتمام الطلب</p>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="booking-card">
                <form action="/book" method="POST" id="bookingForm">
                    <input type="hidden" name="booking_time" id="booking_time" required>

                    <div class="row mb-3 g-3">
                        <div class="col-md-6">
                            <label class="form-label">اسم المتدرب ثلاثي:</label>
                            <input type="text" name="student_name" class="form-control border-primary" placeholder="اكتب اسمك هنا" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">الرقم التدريبي:</label>
                            <input type="text" name="student_id" class="form-control border-primary" placeholder="مثال: 443000000" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">البريد الإلكتروني:</label>
                        <input type="email" name="student_email" class="form-control border-primary text-start" dir="ltr" placeholder="******@tvtc.edu.sa" required>
                        <small class="text-secondary fw-bold mt-1 d-block">
                            💡 ملاحظة: يرجى استخدام البريد الإلكتروني الرسمي للمؤسسة <span dir="ltr" class="text-danger d-inline-block">@tvtc.edu.sa</span>
                        </small>
                    </div>

                    {% if entity_id in ['head', 'faculty'] %}
                    <div class="mb-3">
                        <label class="form-label">القسم التدريبي / المختص:</label>
                        <select id="deptSelect" class="form-select border-primary fw-bold" onchange="fetchStaff()" required>
                            <option value="" disabled selected>-- اختر القسم الأكاديمي أولاً --</option>
                            {% for d_id, d_name in departments.items() %}
                            <option value="{{ d_id }}">{{ d_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    {% endif %}

                    <div class="mb-3">
                        <label class="form-label">اختر الدكتور / المهندس:</label>
                        <select name="target" id="staffSelect" class="form-select border-primary fw-bold" onchange="resetSlots()" required>
                            {% if entity_id == 'affairs' %}
                                <option value="شؤون المتدربين" selected>شؤون المتدربين</option>
                            {% else %}
                                <option value="" disabled selected>-- يرجى اختيار القسم أولاً --</option>
                            {% endif %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">تاريخ الحجز:</label>
                        <div class="input-group">
                            <input type="text" name="booking_date" id="bookingDate" class="form-control border-primary fw-bold text-center text-primary" placeholder="اضغط لاختيار التاريخ من التقويم" readonly required>
                        </div>
                        <small class="text-primary fw-bold mt-2 d-block text-center" id="dayNameDisplay"></small>
                        <input type="hidden" id="dayNameHidden" name="day_name">
                    </div>

                    <div class="mb-5">
                        <label class="form-label">الأوقات المتاحة:</label>
                        <div id="timeSlots" class="p-4 bg-light border border-primary rounded text-center">
                            <span class="text-muted fw-bold">الرجاء اختيار المسؤول وتاريخ الموعد لعرض الساعات المتاحة</span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold py-3 fs-5 shadow-sm rounded-pill" style="background-color: #1877f2; border: none;">✅ تأكيد الحجز النهائي</button>
                    <a href="/" class="btn btn-outline-secondary w-100 fw-bold py-2 mt-2 rounded-pill">رجوع للرئيسية</a>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/ar.js"></script>

<script>
    // تفعيل وتخصيص التقويم الجديد
    flatpickr("#bookingDate", {
        locale: "ar", 
        minDate: "today", 
        disableMobile: "true", 
        disable: [
            function(date) {
                // قفل أيام الجمعة (5) والسبت (6) تلقائياً لتظهر بلون باهت ولا يمكن ضغطها
                return (date.getDay() === 5 || date.getDay() === 6);
            }
        ],
        onChange: function(selectedDates, dateStr, instance) {
            fetchSlots(dateStr);
        }
    });

    function fetchStaff() {
        let deptId = document.getElementById('deptSelect').value;
        let formData = new FormData();
        formData.append('dept_id', deptId);

        fetch('/get_staff_by_dept', {
            method: 'POST',
            body: formData
        })
        .then(response => response.text())
        .then(html => {
            document.getElementById('staffSelect').innerHTML = html;
            resetSlots();
        });
    }

    function resetSlots() {
        document.getElementById('booking_time').value = "";
        document.getElementById('timeSlots').innerHTML = '<span class="text-muted fw-bold">الرجاء اختيار التاريخ لعرض المواعيد المتاحة</span>';
        document.getElementById('bookingDate').value = "";
        document.getElementById('dayNameDisplay').innerText = "";
    }

    function fetchSlots(dateStr) {
        let target = document.getElementById('staffSelect').value;
        if (!dateStr) dateStr = document.getElementById('bookingDate').value;

        if (!target || !dateStr) return;

        let dateObj = new Date(dateStr);
        let daysMap = {6: 'sun', 0: 'mon', 1: 'tue', 2: 'wed', 3: 'thu', 4: 'fri', 5: 'sat'};
        let daysArabic = {6: 'الأحد', 0: 'الإثنين', 1: 'الثلاثاء', 2: 'الأربعاء', 3: 'الخميس', 4: 'الجمعة', 5: 'السبت'};
        
        let dayOfWeek = dateObj.getDay();
        let dayName = daysMap[dayOfWeek];
        let dayNameAr = daysArabic[dayOfWeek];
        
        document.getElementById('dayNameHidden').value = dayName;
        document.getElementById('dayNameDisplay').innerText = "يوم الموعد: " + dayNameAr;

        document.getElementById('timeSlots').innerHTML = '<div class="spinner-border text-primary" role="status"></div><br><span class="text-muted mt-2 d-inline-block">جاري البحث عن مواعيد متاحة...</span>';

        let formData = new FormData();
        formData.append('target', target);
        formData.append('day_name', dayName);
        formData.append('date_str', dateStr);

        fetch('/get_slots_ajax', {
            method: 'POST',
            body: formData
        })
        .then(response => response.text())
        .then(html => {
            document.getElementById('timeSlots').innerHTML = html;
            document.getElementById('booking_time').value = ""; 
        });
    }

    function selectSlot(timeStr, btnElement) {
        document.getElementById('booking_time').value = timeStr;
        
        let allBtns = document.querySelectorAll('.slot-btn');
        allBtns.forEach(btn => {
            btn.classList.remove('selected', 'btn-primary');
            btn.classList.add('btn-outline-primary');
        });
        
        btnElement.classList.remove('btn-outline-primary');
        btnElement.classList.add('btn-primary', 'selected');
    }
</script>
</body>
</html>
