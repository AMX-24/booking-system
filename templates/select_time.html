<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة المواعيد</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; padding: 40px 10px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .booking-card { max-width: 650px; margin: auto; background: white; padding: 35px; border-radius: 20px; box-shadow: 0 15px 35px rgba(30, 58, 138, 0.1); }
        .main-title { color: #1e3a8a; font-weight: bold; margin-bottom: 5px; }
        .sub-title { color: #6b7280; font-size: 14px; margin-bottom: 30px; }
        .section-title { font-size: 15px; font-weight: 600; color: #1e3a8a; margin-top: 20px; margin-bottom: 15px; }
        .time-slot-btn { border: 2px solid #e5e7eb; border-radius: 10px; padding: 10px; background: white; color: #374151; transition: all 0.2s; font-weight: 500; }
        .time-slot-btn:hover { border-color: #1e3a8a; background: #eff6ff; }
        .time-slot-btn.active { background: #1e3a8a; color: white; border-color: #1e3a8a; }
    </style>
</head>
<body>

    <div class="booking-card">
        <h2 class="text-center main-title">بوابة المواعيد</h2>
        <p class="text-center sub-title">يرجى إدخال بياناتك واختيار الموعد المناسب لإتمام الطلب</p>
        
        <form action="/submit_booking" method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">اسم المتدرب بالكامل:</label>
                    <input type="text" name="student_name" class="form-control" placeholder="أدخل اسمك الثلاثي" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">الرقم الأكاديمي / التدريبي:</label>
                    <input type="text" name="student_id" class="form-control" placeholder="مثال: 44210000" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">اختر الدكتور / المهندس:</label>
                <select name="selected_staff" class="form-select" required>
                    <option value="" disabled selected>-- اختر من القائمة المتوفرة --</option>
                    {% for name in staff %}
                        <option value="{{ name }}">{{ name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label">تاريخ الحجز:</label>
                <input type="text" id="liveDatePicker" name="booking_date" class="form-control bg-white" placeholder="اضغط هنا لاختيار التاريخ من التقويم" required readonly>
            </div>

            <div class="section-title">
                ⏱️ الساعات المتوفرة حالياً:
            </div>
            
            <div id="statusPlaceholder" class="alert alert-light text-center border p-4 text-muted">
                الرجاء إكمال الاختيارات والتاريخ لعرض الفترات المتوفرة المتاحة.
            </div>

            <div id="slotsContainer" class="row g-2 mb-4 d-none">
                <div class="col-4">
                    <button type="button" class="btn time-slot-btn w-100" onclick="selectTimeSlot('08:00 ص', this)">08:00 ص</button>
                </div>
                <div class="col-4">
                    <button type="button" class="btn time-slot-btn w-100" onclick="selectTimeSlot('10:00 ص', this)">10:00 ص</button>
                </div>
                <div class="col-4">
                    <button type="button" class="btn time-slot-btn w-100" onclick="selectTimeSlot('12:30 م', this)">12:30 م</button>
                </div>
                <div class="col-4">
                    <button type="button" class="btn time-slot-btn w-100" onclick="selectTimeSlot('01:15 م', this)">01:15 م</button>
                </div>
                <input type="hidden" id="selectedTimeInput" name="booking_time" required>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary flex-grow-1 py-2" style="background-color: #1e3a8a;">تأكيد موعد الحجز</button>
                <a href="/" class="btn btn-secondary px-4 py-2">رجوع للرئيسية</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/ar.js"></script>
    <script>
        // تفعيل التقويم المنبثق
        flatpickr("#liveDatePicker", {
            locale: "ar",
            dateFormat: "Y-m-d",
            minDate: "today",
            onChange: function(selectedDates, dateStr, instance) {
                if (dateStr) {
                    // إخفاء الرسالة التنبيهية وإظهار الأوقات
                    document.getElementById('statusPlaceholder').classList.add('d-none');
                    document.getElementById('slotsContainer').classList.remove('d-none');
                }
            }
        });

        // اختيار الوقت وتغيير لون الزر المختار
        function selectTimeSlot(timeString, buttonElement) {
            document.querySelectorAll('.time-slot-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            buttonElement.classList.add('active');
            document.getElementById('selectedTimeInput').value = timeString;
        }
    </script>
</body>
</html>
