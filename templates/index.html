<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة حجز المواعيد الإلكترونية - CTI</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* وضع صورة مبنى الكلية كخلفية مع طبقة زرقاء داكنة شفافة ومتناسقة */
            background-image: linear-gradient(rgba(0, 32, 91, 0.45), rgba(0, 32, 91, 0.7)), url('https://lh3.googleusercontent.com/p/AF1QipN3D-eR3j9h6yS0Y4Z9fQo1S5k9b8f3C7W_Q1YF=s1600-w1000');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .glass-card {
            /* ستايل زجاجي شفاف احترافي */
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .main-logo {
            max-width: 220px; /* حجم الشعار الجديد ليكون واضحاً */
            height: auto;
            margin-bottom: 20px;
        }
        .btn-custom {
            background: linear-gradient(135deg, #00205b, #0056b3);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,32,91,0.4);
            color: #fff;
            background: linear-gradient(135deg, #00153b, #004085);
        }
        .system-title {
            color: #00205b;
            font-weight: 800;
        }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-7 text-center">
            <div class="card glass-card p-5">
                <!-- الشعار الرسمي الجديد الذي أرسلته -->
                <img src="https://www.al-madina.com/uploads/images/2025/11/05/2485738.jpeg" alt="شعار كلية الاتصالات بجدة" class="main-logo mx-auto d-block">
                
                <h2 class="system-title mb-2">نظام حجز المواعيد الإلكتروني</h2>
                <p class="text-muted mb-4 fw-bold">كلية الاتصالات بجدة</p>
                <hr class="mb-4" style="border-color: #00205b;">
                
                <p class="text-dark fw-medium mb-4">فضلاً، اختر الجهة التي ترغب بجدولة الموعد معها للاستمرار:</p>
                
                <div class="d-grid gap-3">
                    {% for id, name in entities.items() %}
                        <a href="{{ url_for('select_time', entity_id=id) }}" class="btn btn-custom">{{ name }}</a>
                    {% endfor %}
                </div>
                
                <div class="mt-4 pt-3">
                    <a href="{{ url_for('admin_login') }}" class="text-decoration-none small text-secondary fw-semibold">🔐 لوحة تحكم النظام (خاص بالموظفين)</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
