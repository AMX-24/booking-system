<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة حجز المواعيد الإلكترونية - CTI</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #0f2b5c, #1a428a);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: #ffffff !important;
            border-radius: 24px !important;
            border: none !important;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3) !important;
            width: 100%;
            max-width: 580px;
        }
        .institution-title {
            color: #707070;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .btn-custom {
            background: linear-gradient(135deg, #0044cc, #0066ff);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.15rem;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.2s ease;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 68, 204, 0.4);
            color: #fff;
            background: linear-gradient(135deg, #0033aa, #0055dd);
        }
        .system-title {
            color: #00205b;
            font-weight: 800;
            font-size: 1.85rem;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center">
    <div class="card glass-card p-5 text-center shadow">
        
        <!-- تم استبدال الصورة بنص رسمي أنيق ومنظم علوي -->
        <div class="institution-title mb-3">المؤسسة العامة للتدريب التقني والمهني</div>
        
        <h2 class="system-title mb-1">نظام حجز المواعيد الإلكتروني</h2>
        <p class="text-muted mb-4 fw-bold" style="font-size: 1rem;">كلية الاتصالات بجدة</p>
        
        <hr class="mb-4" style="border-color: #0044cc; opacity: 0.15;">
        
        <p class="text-dark fw-medium mb-4" style="font-size: 0.95rem;">فضلاً، اختر الجهة التي ترغب بجدولة الموعد معها للاستمرار:</p>
        
        <div class="d-grid gap-3">
            {% for id, name in entities.items() %}
                <a href="{{ url_for('select_time', entity_id=id) }}" class="btn btn-custom shadow-sm">{{ name }}</a>
            {% endfor %}
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
