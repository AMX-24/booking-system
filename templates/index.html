<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة حجز المواعيد الإلكترونية - CTI</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            /* تعديل جذري: تم استخدام رابط مباشر ومفتوح لصورة المبنى لتظهر بالخلفية مجبراً */
            background-image: linear-gradient(rgba(0, 32, 91, 0.55), rgba(0, 32, 91, 0.75)), url('https://i.imgur.com/kS9wTbh.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            /* كرت شفاف أنيق يعزل المحتوى */
            background: rgba(255, 255, 255, 0.94) !important;
            border-radius: 24px !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45) !important;
            width: 100%;
            max-width: 600px;
        }
        .main-logo {
            /* وضع شعار الكلية التقنية الرسمي بالمنتصف وحذف الصورة القديمة */
            max-width: 250px;
            height: auto;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .btn-custom {
            background: linear-gradient(135deg, #003399, #0056b3);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.15rem;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 51, 153, 0.4);
            color: #fff;
            background: linear-gradient(135deg, #002266, #004085);
        }
        .system-title {
            color: #00205b;
            font-weight: 800;
            font-size: 1.8rem;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center">
    <div class="card glass-card p-5 text-center shadow">
        
        <!-- هنا تم وضع شعار الكلية التقنية الرسمي والحديث بالمنتصف بدلاً من صورة المبنى -->
        <img src="https://i.imgur.com/gK9uUsh.png" alt="شعار الكلية التقنية" class="main-logo">
        
        <h2 class="system-title mb-1">نظام حجز المواعيد الإلكتروني</h2>
        <p class="text-muted mb-4 fw-bold" style="font-size: 1.05rem;">كلية الاتصالات بجدة</p>
        
        <hr class="mb-4" style="border-color: #003399; opacity: 0.2;">
        
        <p class="text-dark fw-medium mb-4" style="font-size: 1rem;">فضلاً، اختر الجهة التي ترغب بجدولة الموعد معها للاستمرار:</p>
        
        <!-- أزرار الاختيار الكحلية للمتدربين -->
        <div class="d-grid gap-3">
            {% for id, name in entities.items() %}
                <a href="{{ url_for('select_time', entity_id=id) }}" class="btn btn-custom shadow-sm">{{ name }}</a>
            {% endfor %}
        </div>
        
        <!-- تم التأكيد على إخفاء رابط لوحة التحكم نهائياً من هنا -->

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
