<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة حجز المواعيد - الكلية التقنية</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a3bded 0%, #f4f7f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main-card {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            padding: 40px;
            max-width: 650px;
            width: 100%;
            text-align: center;
        }
        .logo-img {
            max-height: 110px;
            margin-bottom: 25px;
        }
        .btn-entity {
            background-color: #2d6a4f;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            border: none;
            width: 100%;
            display: block;
            text-decoration: none;
        }
        .btn-entity:hover {
            background-color: #1b4332;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(45, 106, 79, 0.3);
            color: white;
        }
        .admin-link {
            font-size: 0.95rem;
            color: #6c757d;
            text-decoration: none;
            margin-top: 25px;
            display: inline-block;
            transition: color 0.2s;
        }
        .admin-link:hover { color: #2d6a4f; }
    </style>
</head>
<body>

<div class="main-card">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="شعار الكلية التقنية" class="logo-img" onerror="this.style.display='none'">
    <h2 class="fw-bold mb-3 text-dark">بوابة حجز المواعيد الإلكترونية</h2>
    <p class="text-secondary mb-4">الرجاء اختيار الجهة المطلوبة لاستكمال الحجز الإلكتروني:</p>
    
    <div class="mt-2">
        {% for id, name in entities.items() %}
            <a href="{{ url_for('select_time', entity_id=id) }}" class="btn-entity">{{ name }}</a>
        {% endfor %}
    </div>
    
    <a href="{{ url_for('admin_login') }}" class="admin-link">📊 دخول لوحة التحكم (الإدارة)</a>
</div>

</body>
</html>
