<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة حجز المواعيد - الكلية التقنية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; padding: 50px; }
        .container { background: white; max-width: 600px; margin: auto; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .dept-btn { display: block; background: #2d6a4f; color: white; padding: 18px; margin: 15px 0; border-radius: 12px; text-decoration: none; font-size: 20px; font-weight: bold; transition: 0.3s; }
        .dept-btn:hover { background: #1b4332; color: white; transform: translateY(-3px); }
        h1 { color: #1a3a3a; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="{{ url_for('static', filename='logo.png') }}" width="160" style="margin-bottom: 20px;" alt="شعار الكلية">
        
        <h1>نظام الاستعلام عن المواعيد</h1>
        
        {% for id, name in departments.items() %}
            <a href="{{ url_for('select_time', entity_id=id) }}" class="dept-btn">{{ name }}</a>
        {% endfor %}

        <hr class="my-4">
        <a href="{{ url_for('login') }}" class="btn btn-outline-secondary btn-sm">دخول الإدارة</a>
    </div>
</body>
</html>
