<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز موعد: {{ department.name }}</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f6f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .booking-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        h2 { text-align: center; color: #333; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-control {
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px;
        }
        .slots-container {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px;
        }
        .slot-btn {
            border: 1px solid #2e7d32; padding: 12px; border-radius: 8px; text-align: center;
            background-color: #e8f5e9; cursor: pointer; font-size: 14px; font-weight: bold; color: #2e7d32;
        }
        .slot-btn:hover { background-color: #c8e6c9; }
        .slot-btn.selected {
            background-color: #a5d6a7 !important; border-color: #1b5e20 !important; color: #1b5e20 !important;
        }
        .btn-submit {
            background-color: #1e4620; color: white; width: 100%; padding: 14px;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 25px; cursor: pointer;
        }
        .btn-submit:hover { background-color: #153317; }
    </style>
</head>
<body>

<div class="booking-card">
    <h2>حجز موعد: {{ department.name }}</h2>

    <form method="POST" action="/booking/{{ dept_id }}">
        <div class="form-group">
            <label>اسم المتدرب:</label>
            <input type="text" name="name" class="form-control" required placeholder="أدخل اسمك الثلاثي">
        </div>
        
        <div class="form-group">
            <label>الرقم الأكاديمي:</label>
            <input type="text" name="acad_id" class="form-control" required placeholder="أدخل الرقم الأكاديمي">
        </div>

        {% if dept_id == '2' %}
        <div class="form-group">
            <label>تحديد القسم المختص:</label>
            <select name="sub_dept" class="form-control" required>
                <option value="">-- اختر رئيس القسم --</option>
                <option value="رئيس قسم الحاسب">رئيس قسم الحاسب</option>
                <option value="رئيس قسم الاتصالات">رئيس قسم الاتصالات</option>
                <option value="رئيس قسم الإلكترونيات">رئيس قسم الإلكترونيات</option>
                <option value="رئيس قسم المواد العامة">رئيس قسم المواد العامة</option>
            </select>
        </div>
        {% endif %}

        <div class="form-group">
            <label>اختر الموعد المناسب:</label>
            <input type="hidden" name="time" id="selected-time-input" required>
            <div class="slots-container">
                {% if dept_id == '1' %}
                    <div class="slot-btn" onclick="selectTime(this, '08:00 ص')">08:00 ص</div>
                    <div class="slot-btn" onclick="selectTime(this, '08:30 ص')">08:30 ص</div>
                    <div class="slot-btn" onclick="selectTime(this, '09:00 ص')">09:00 ص</div>
                    <div class="slot-btn" onclick="selectTime(this, '09:30 ص')">09:30 ص</div>
                    <div class="slot-btn" onclick="selectTime(this, '10:00 ص')">10:00 ص</div>
                    <div class="slot-btn" onclick="selectTime(this, '10:30 ص')">10:30 ص</div>
                {% elif dept_id == '2' %}
                    <div class="slot-btn" onclick="selectTime(this, '09:00 ص')">09:00 ص</div>
                    <div class="slot-btn" onclick="selectTime(this, '09:30 ص')">09:30 ص</div>
                    <div class="slot-btn" onclick="selectTime(this, '10:00 ص')">10:00 ص</div>
                    <div class="slot-btn" onclick="selectTime(this, '10:30 ص')">10:30 ص</div>
                    <div class="slot-btn" onclick="selectTime(this, '11:00 ص')">11:00 ص</div>
                {% else %}
                    <div class="slot-btn" onclick="selectTime(this, '08:00 ص')">08:00 ص</div>
                    <div class="slot-btn" onclick="selectTime(this, '08:30 ص')">08:30 ص</div>
                    <div class="slot-btn" onclick="selectTime(this, '09:00 ص')">09:00 ص</div>
                    <div class="slot-btn" onclick="selectTime(this, '09:30 ص')">09:30 ص</div>
                {% endif %}
            </div>
        </div>

        <button type="submit" class="btn-submit">تأكيد الحجز</button>
    </form>
</div>

<script>
    function selectTime(button, timeValue) {
        // إزالة التحديد عن بقية الأزرار
        document.querySelectorAll('.slot-btn').forEach(btn => btn.classList.remove('selected'));
        // إضافة التحديد للزر المختار
        button.classList.add('selected');
        // حفظ الوقت في الحقل المخفي لإرساله للسيرفر
        document.getElementById('selected-time-input').value = timeValue;
    }
</script>

</body>
</html>
