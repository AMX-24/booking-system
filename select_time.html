<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اختيار موعد الحجز</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; padding: 30px; margin: 0; }
        .container { background: white; max-width: 700px; margin: auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .form-group { text-align: right; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        
        .slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-top: 15px; }
        .slot-card { padding: 15px; border: 2px solid #2d6a4f; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: bold; color: #2d6a4f; background: white; }
        .slot-card:hover { background: #e8f5e9; transform: translateY(-2px); }
        .slot-card.selected { background: #2d6a4f; color: white; }
        
        button { width: 100%; background: #2d6a4f; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 30px; font-weight: bold; }
        .no-slots { color: #dc2626; font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h2>حجز موعد: {{ dept.name }}</h2>
        <form action="{{ url_for('reserve', dept_id=dept_id) }}" method="POST" id="bookingForm">
            <div class="form-group"><label>اسم المتدرب:</label><input type="text" name="student_name" required></div>
            <div class="form-group"><label>الرقم الأكاديمي:</label><input type="text" name="academic_id" required></div>

            {% if dept.sub_sections %}
            <div class="form-group">
                <label>تحديد القسم المختص:</label>
                <select name="manager_name" id="manager_select" required onchange="renderSlots()">
                    <option value="" disabled selected>-- اختر رئيس القسم --</option>
                    {% for manager in dept.sub_sections.keys() %}
                        <option value="{{ manager }}">{{ manager }}</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}

            <div class="form-group">
                <label>اختر الموعد المناسب:</label>
                <div id="slotsContainer" class="slots-grid"></div>
                <input type="hidden" name="selected_time" id="selectedTimeInput" required>
            </div>
            <button type="submit">تأكيد الحجز</button>
        </form>
    </div>

    <script>
        const subData = {{ dept.sub_sections|tojson|safe if dept.sub_sections else 'null' }};
        const generalSlots = {{ dept.slots|tojson|safe if dept.slots else '[]' }};
        
        function renderSlots() {
            const container = document.getElementById('slotsContainer');
            const hiddenInput = document.getElementById('selectedTimeInput');
            container.innerHTML = ''; hiddenInput.value = '';
            let slots = subData ? (subData[document.getElementById('manager_select').value] || []) : generalSlots;

            if (slots.length === 0) { container.innerHTML = '<p class="no-slots">لا توجد مواعيد متاحة.</p>'; return; }

            slots.forEach(slot => {
                const div = document.createElement('div');
                div.className = 'slot-card'; div.innerText = slot;
                div.onclick = function() {
                    document.querySelectorAll('.slot-card').forEach(c => c.classList.remove('selected'));
                    div.classList.add('selected'); hiddenInput.value = slot;
                };
                container.appendChild(div);
            });
        }
        if (!subData) renderSlots();
    </script>
</body>
</html>
