<form method="POST" action="/booking/{{ dept_id }}">
    <div class="form-group">
        <label>اسم المتدرب / الثلاثي:</label>
        <input type="text" name="name" class="form-control" required>
    </div>
    
    <div class="form-group">
        <label>الرقم الأكاديمي:</label>
        <input type="text" name="acad_id" class="form-control" required>
    </div>

    <div class="form-group">
        <label>اختر الوقت المناسب:</label>
        <div class="slots-container" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px;">
            {% for slot in slots %}
                <label class="slot-option" style="border: 1px solid #2e7d32; padding: 10px; border-radius: 5px; text-align: center; background-color: #e8f5e9; cursor: pointer;">
                    <input type="radio" name="time" value="{{ slot }}" required style="margin-right: 5px;">
                    {{ slot }}
                </label>
            {% endfor %}
        </div>
    </div>

    <button type="submit" style="background-color: #2e7d32; color: white; width: 100%; padding: 12px; border: none; border-radius: 5px; font-size: 16px; margin-top: 20px; cursor: pointer;">
        تأكيد الحجز
    </button>
</form>
