<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استكمال بيانات الحجز</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f6f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .booking-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
        }
        h2 { text-align: center; color: #333; margin-top: 0; }
        .dept-title {
            background-color: #f0f0f0;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-control {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box;
        }
        .slots-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px;
        }
        .slot-option {
            border: 1px solid #2e7d32; padding: 10px; border-radius: 8px; text-align: center;
            background-color: #e8f5e9; cursor: pointer; display: block; font-size: 14px; transition: 0.2s;
        }
        .slot-option input { display: none; }
        .slot-option:has(input:checked) {
            background-color: #a5d6a7; border-color: #1b5e20; font-weight: bold;
        }
        .btn-submit {
            background-color: #1e4620; color: white; width: 100%; padding: 12px;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer;
        }
        .btn-submit:hover { background-color: #153317; }
        .btn-cancel { display: block; text-align: center; margin-top: 15px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="booking-card">
    <h2>استكمال بيانات الحجز</h2>
    <div class="dept-title">الجهة: {{ department.name }}</div>

    <form method="POST" action="/booking/{{ dept_id }}">
        <div class="form-group">
            <label>اسم المتدرب / الثلاثي:</label>
            <input type="text" name="name" class="form-control" required placeholder="أدخل اسمك الثلاثي">
        </div>
        
        <div class="form-group">
            <label>الرقم الأكاديمي:</label>
            <input type="text" name="acad_id" class="form-control" required placeholder="أدخل الرقم الأكاديمي">
        </div>

        <div class="form-group">
            <label>اختر الوقت المناسب:</label>
            <div class="slots-grid">
                {% for slot in slots %}
                    <label class="slot-option">
                        <input type="radio" name="time" value="{{ slot }}" required>
                        <span>{{ slot }}</span>
                    </label>
                {% endfor %}
            </div>
        </div>

        <button type="submit" class="btn-submit">تأكيد الحجز</button>
        <a href="/" class="btn-cancel">إلغاء والعودة للرئيسية</a>
    </form>
</div>

</body>
</html>
