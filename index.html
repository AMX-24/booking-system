<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة حجز المواعيد الإلكترونية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }
        h1 {
            color: #1a3a2a;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            text-decoration: none;
            display: block;
        }
        .btn:hover {
            background-color: #218838;
            transform: translateY(-2px);
        }
        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>بوابة حجز المواعيد الإلكترونية</h1>
        <div class="subtitle">الرجاء اختيار الجهة المطلوبة لاستكمال الحجز:</div>
        
        <div class="btn-group">
            <!-- الأزرار الرئيسية الثلاثة المتاحة للجمهور والمستخدمين -->
            <a href="/department/trainee_affairs" class="btn">شؤون المتدربين</a>
            <a href="/department/heads" class="btn">رئيس القسم</a>
            <a href="/department/faculty" class="btn">عضو هيئة تدريس</a>
        </div>
        
        <!-- [ملاحظة تخرج]: تم هنا حذف رابط "دخول لوحة التحكم (الإدارة)" نهائياً لضمان الخصوصية والأمان الإداري -->
    </div>

</body>
</html>
