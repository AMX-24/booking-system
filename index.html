<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة حجز المواعيد الإلكترونية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }
        h1 {
            color: #1e4620;
            font-size: 26px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .subtitle {
            color: #555;
            font-size: 14px;
            margin-bottom: 35px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            background-color: #2e6930; /* اللون الأخضر المطابق تماماً لصورتك */
            color: white;
            border: none;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            text-decoration: none;
            display: block;
        }
        .btn:hover {
            background-color: #235025;
            transform: translateY(-1px);
        }
        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>بوابة حجز المواعيد الإلكترونية</h1>
        <div class="subtitle">الرجاء اختيار الجهة المطلوبة لاستكمال الحجز:</div>
        
        <div class="btn-group">
            <a href="/department/trainee_affairs" class="btn">شؤون المتدربين</a>
            <a href="/department/computer" class="btn">رئيس القسم</a>
            <a href="/department/general" class="btn">عضو هيئة تدريس</a>
        </div>
        
        </div>

</body>
</html>
